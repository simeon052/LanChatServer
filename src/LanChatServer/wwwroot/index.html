<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LanChat</title>
<!-- xterm.js for Hermes terminal -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1a;--surface:#252525;--surface2:#2e2e2e;
  --border:#383838;--text:#e8e8e8;--text2:#9a9a9a;
  --accent:#6c9fde;--accent2:#4a7fbf;
  --user-bg:#2b3d5a;--ai-bg:#2a2a2a;
  --error:#c0392b;--success:#27ae60;
  --hermes:#8e44ad;--hermes2:#6c3483;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Sidebar */
#sidebar-header{padding:14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
#sidebar-header h1{font-size:17px;font-weight:600;flex:1}
#btn-new{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;font-size:13px;white-space:nowrap}
#btn-new:hover{background:var(--accent2)}
#session-list{flex:1;overflow-y:auto;padding:6px}

.session-item{padding:10px 10px;border-radius:8px;cursor:pointer;margin-bottom:3px;display:flex;flex-direction:column;gap:3px;border:1px solid transparent}
.session-item:hover{background:var(--surface2)}
.session-item.active{background:var(--surface2);border-color:var(--border)}
.session-item .s-name{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px}
.session-item .s-meta{font-size:11px;color:var(--text2)}
.badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:600;text-transform:uppercase}
.badge-claude{background:#1a3a5a;color:var(--accent)}
.badge-hermes{background:#2d1a3d;color:#c39bd3}
.badge-offline{background:#3d1a1a;color:#e74c3c}
.del-btn{margin-left:auto;font-size:11px;color:var(--text2);background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;opacity:0}
.session-item:hover .del-btn{opacity:1}
.del-btn:hover{color:#e74c3c;background:#3d1a1a}

/* Main area */
#chat-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:52px;flex-shrink:0}
#chat-title{font-size:15px;font-weight:600;flex:1}
#chat-subtitle{font-size:12px;color:var(--text2)}
#no-session{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-direction:column;gap:12px}
#no-session p{font-size:14px}

/* Claude chat */
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;flex-direction:column;max-width:85%}
.msg.user{align-self:flex-end}
.msg.assistant,.msg.ai{align-self:flex-start}
.msg-bubble{padding:10px 14px;border-radius:12px;line-height:1.55;white-space:pre-wrap;word-break:break-word;font-size:14px}
.msg.user .msg-bubble{background:var(--user-bg);border-bottom-right-radius:3px}
.msg.assistant .msg-bubble,.msg.ai .msg-bubble{background:var(--ai-bg);border-bottom-left-radius:3px;border:1px solid var(--border)}
.msg-label{font-size:11px;color:var(--text2);padding:0 4px;margin-bottom:3px}
.msg.user .msg-label{text-align:right}
.streaming-cursor::after{content:'▋';animation:blink 1s step-end infinite;color:var(--accent)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

#input-area{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
#input-area textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;resize:none;max-height:120px;min-height:42px;font-family:inherit;line-height:1.4;outline:none}
#input-area textarea:focus{border-color:var(--accent)}
#send-btn{background:var(--accent);color:#fff;border:none;border-radius:10px;width:42px;height:42px;cursor:pointer;font-size:18px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#send-btn:hover{background:var(--accent2)}
#send-btn:disabled{background:var(--surface2);color:var(--text2);cursor:not-allowed}

/* Hermes terminal */
#terminal-container{flex:1;display:flex;flex-direction:column;min-height:0;background:#0d0d0d;padding:8px;position:relative}
#terminal-container .xterm{height:100%}
#terminal-container .xterm-viewport{overflow-y:auto!important}
#term-status{position:absolute;bottom:12px;right:14px;font-size:11px;color:var(--text2);background:rgba(0,0,0,.6);padding:2px 8px;border-radius:10px;pointer-events:none}

/* Modal */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(420px,92vw);display:flex;flex-direction:column;gap:16px}
#modal h2{font-size:17px;font-weight:600}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:13px;color:var(--text2)}
.form-group select,.form-group input,.form-group textarea{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.form-group select:focus,.form-group input:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.btn-secondary{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:9px 18px;cursor:pointer;font-size:14px;font-weight:500}
.btn-primary:hover{background:var(--accent2)}
.hermes-note{background:#2d1a3d;border:1px solid #6c3483;border-radius:8px;padding:10px 12px;font-size:12px;color:#c39bd3;line-height:1.5}

/* Mobile */
#menu-btn{display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;padding:4px}
@media(max-width:600px){
  #sidebar{position:fixed;inset:0 auto 0 0;z-index:50;width:280px;transform:translateX(-100%);transition:transform .25s}
  #sidebar.open{transform:translateX(0)}
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:49}
  #overlay.open{display:block}
  #menu-btn{display:block}
  .msg{max-width:95%}
}
</style>
</head>
<body>
<div id="overlay" onclick="closeSidebar()"></div>

<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <h1>💬 LanChat</h1>
      <button id="btn-new" onclick="openNewModal()">+ 新規</button>
    </div>
    <div id="session-list"></div>
    <div style="padding:8px 6px;border-top:1px solid var(--border)">
      <button onclick="openImportModal()" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px;cursor:pointer;font-size:12px">📥 Claude Codeから再開</button>
    </div>
  </div>

  <div id="main">
    <div id="chat-header">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <div style="flex:1">
        <div id="chat-title">セッションを選択</div>
        <div id="chat-subtitle"></div>
      </div>
    </div>

    <div id="no-session">
      <div style="font-size:40px">🤖</div>
      <p>左のサイドバーからセッションを選ぶか、<br>「+ 新規」で新しいセッションを作成してください。</p>
    </div>

    <!-- Claude chat UI -->
    <div id="messages" style="display:none"></div>
    <div id="input-area" style="display:none">
      <textarea id="msg-input" placeholder="メッセージを入力..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()">↑</button>
    </div>

    <!-- Hermes terminal UI -->
    <div id="terminal-container" style="display:none">
      <div id="xterm-mount" style="width:100%;height:100%"></div>
      <div id="term-status">接続中...</div>
    </div>
  </div>
</div>

<!-- Import from Claude Code Modal -->
<div id="import-modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center">
  <div id="import-modal" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(480px,92vw);display:flex;flex-direction:column;gap:14px;max-height:80vh">
    <h2 style="font-size:17px;font-weight:600">📥 Claude Code セッションから再開</h2>
    <p style="font-size:12px;color:var(--text2);line-height:1.5">
      ~/.claude/projects/ のセッションを読み込み、会話を継続できます。<br>
      <span style="color:#f39c12">⚠ ツール呼び出し履歴は除外され、テキスト会話のみ引き継がれます。</span>
    </p>
    <div id="cc-session-list" style="overflow-y:auto;flex:1;border:1px solid var(--border);border-radius:8px;min-height:200px"></div>
    <div style="display:flex;justify-content:flex-end">
      <button class="btn-secondary" onclick="closeImportModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- New Session Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h2>新規セッション</h2>
    <div class="form-group">
      <label>バックエンド</label>
      <select id="sel-backend" onchange="onBackendChange()">
        <option value="claude">Claude (Anthropic API)</option>
        <option value="hermes">Hermes Agent (ターミナル)</option>
      </select>
    </div>
    <div id="claude-opts">
      <div class="form-group" style="margin-bottom:12px">
        <label>モデル</label>
        <select id="sel-model">
          <option value="claude-sonnet-4-6">claude-sonnet-4-6 (推奨)</option>
          <option value="claude-haiku-4-5-20251001">claude-haiku-4-5 (高速)</option>
          <option value="claude-opus-4-8">claude-opus-4-8 (高性能)</option>
        </select>
      </div>
      <div class="form-group">
        <label>システムプロンプト (省略可)</label>
        <textarea id="inp-system" placeholder="You are a helpful assistant."></textarea>
      </div>
    </div>
    <div id="hermes-opts" style="display:none">
      <div class="hermes-note">
        ⚡ Hermes Agent を ConPTY（仮想コンソール）経由で起動します。<br>
        ブラウザ内でフルターミナルとして操作できます。<br>
        <code>hermes</code> コマンドが PATH に存在する必要があります。
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" onclick="createSession()">作成</button>
    </div>
  </div>
</div>

<script>
let currentSessionId = null;
let currentBackend = null;
let isStreaming = false;

// Hermes terminal state
let hermesWs = null;
let hermesTerminal = null;
let hermesFitAddon = null;
let hermesResizeObserver = null;

// ---- Sessions ----
async function loadSessions() {
  const res = await fetch('/api/sessions');
  const sessions = await res.json();
  renderSessionList(sessions);
}

function renderSessionList(sessions) {
  const list = document.getElementById('session-list');
  list.innerHTML = '';
  if (sessions.length === 0) {
    list.innerHTML = '<div style="padding:16px;color:var(--text2);font-size:13px;text-align:center">セッションがありません</div>';
    return;
  }
  for (const s of sessions) {
    const div = document.createElement('div');
    div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
    div.onclick = () => selectSession(s.id, s.backend);
    const badge = s.backend === 'claude'
      ? `<span class="badge badge-claude">Claude</span>`
      : (s.isActive
          ? `<span class="badge badge-hermes">Hermes</span>`
          : `<span class="badge badge-offline">停止</span>`);
    const meta = s.backend === 'claude'
      ? `${s.messageCount} メッセージ`
      : (s.isActive ? '実行中' : '停止済み');
    div.innerHTML = `
      <div class="s-name">${badge} ${escHtml(s.name)}
        <button class="del-btn" onclick="deleteSession(event,'${s.id}')">✕</button>
      </div>
      <div class="s-meta">${meta} · ${fmtTime(s.createdAt)}</div>`;
    list.appendChild(div);
  }
}

async function selectSession(id, backend) {
  // 前の Hermes ターミナルを切断
  disconnectHermes();

  currentSessionId = id;
  currentBackend = backend;
  closeSidebar();

  const res = await fetch(`/api/sessions/${id}`);
  const session = await res.json();

  document.getElementById('chat-title').textContent = session.name;
  document.getElementById('no-session').style.display = 'none';

  if (backend === 'hermes') {
    // Hermes: ターミナル表示
    document.getElementById('messages').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('terminal-container').style.display = 'flex';
    document.getElementById('chat-subtitle').textContent = session.isActive ? '● 実行中 (ターミナル)' : '● 停止';
    if (session.isActive) connectHermes(id);
  } else {
    // Claude: チャット表示
    document.getElementById('terminal-container').style.display = 'none';
    document.getElementById('messages').style.display = 'flex';
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('chat-subtitle').textContent =
      session.systemPrompt ? `System: ${session.systemPrompt.slice(0, 50)}…` : '';

    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    if (session.messages) {
      for (const m of session.messages) appendMessage(m.role, m.content);
    }
    scrollToBottom();
    document.getElementById('msg-input').focus();
  }

  await loadSessions();
}

// ---- Hermes terminal ----
function connectHermes(id) {
  const mount = document.getElementById('xterm-mount');
  mount.innerHTML = '';

  hermesTerminal = new Terminal({
    cursorBlink: true,
    theme: { background: '#0d0d0d', foreground: '#e8e8e8', cursor: '#6c9fde' },
    fontFamily: "'Cascadia Code', 'Consolas', 'Courier New', monospace",
    fontSize: 13,
    scrollback: 2000,
  });

  hermesFitAddon = new FitAddon.FitAddon();
  hermesTerminal.loadAddon(hermesFitAddon);
  hermesTerminal.open(mount);
  hermesFitAddon.fit();

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl = `${proto}://${location.host}/api/sessions/${id}/terminal`;
  hermesWs = new WebSocket(wsUrl);
  hermesWs.binaryType = 'arraybuffer';

  const statusEl = document.getElementById('term-status');
  statusEl.textContent = '接続中...';

  hermesWs.onopen = () => {
    statusEl.textContent = '接続済み';
    setTimeout(() => { statusEl.style.opacity = '0.4'; }, 2000);
  };

  hermesWs.onmessage = (e) => {
    if (e.data instanceof ArrayBuffer) {
      hermesTerminal.write(new Uint8Array(e.data));
    }
  };

  hermesWs.onerror = () => { statusEl.textContent = 'エラー'; statusEl.style.opacity = '1'; };
  hermesWs.onclose = () => {
    statusEl.textContent = '切断';
    statusEl.style.opacity = '1';
  };

  // キー入力を ConPTY へ送る
  hermesTerminal.onData((data) => {
    if (hermesWs && hermesWs.readyState === WebSocket.OPEN) {
      hermesWs.send(new TextEncoder().encode(data));
    }
  });

  // リサイズ追従
  hermesResizeObserver = new ResizeObserver(() => {
    try { hermesFitAddon.fit(); } catch(e) {}
  });
  hermesResizeObserver.observe(mount);
}

function disconnectHermes() {
  if (hermesResizeObserver) { hermesResizeObserver.disconnect(); hermesResizeObserver = null; }
  if (hermesWs) { hermesWs.close(); hermesWs = null; }
  if (hermesTerminal) { hermesTerminal.dispose(); hermesTerminal = null; }
  document.getElementById('term-status').style.opacity = '1';
}

// ---- Session actions ----
async function deleteSession(e, id) {
  e.stopPropagation();
  if (!confirm('このセッションを削除しますか？')) return;
  if (currentSessionId === id) disconnectHermes();
  await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  if (currentSessionId === id) {
    currentSessionId = null;
    document.getElementById('no-session').style.display = 'flex';
    document.getElementById('messages').style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('terminal-container').style.display = 'none';
  }
  await loadSessions();
}

// ---- New Session Modal ----
function openNewModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('inp-system').value = '';
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function onBackendChange() {
  const b = document.getElementById('sel-backend').value;
  const co = document.getElementById('claude-opts');
  co.style.display = b === 'claude' ? 'flex' : 'none';
  co.style.flexDirection = 'column';
  co.style.gap = '12px';
  document.getElementById('hermes-opts').style.display = b === 'hermes' ? 'block' : 'none';
}

async function createSession() {
  const backend = document.getElementById('sel-backend').value;
  const body = {
    backend,
    model: backend === 'claude' ? document.getElementById('sel-model').value : undefined,
    systemPrompt: backend === 'claude' ? document.getElementById('inp-system').value || undefined : undefined,
  };
  const res = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) {
    const err = await res.json();
    alert('エラー: ' + (err.error ?? '不明なエラー'));
    return;
  }
  const session = await res.json();
  closeModal();
  await loadSessions();
  selectSession(session.id, backend);
}

// ---- Claude Chat ----
async function sendMessage() {
  if (isStreaming || !currentSessionId || currentBackend !== 'claude') return;
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;

  input.value = '';
  input.style.height = '';
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', content);

  const aiDiv = appendMessage('assistant', '');
  const bubble = aiDiv.querySelector('.msg-bubble');
  bubble.classList.add('streaming-cursor');
  let aiText = '';

  try {
    const res = await fetch(`/api/sessions/${currentSessionId}/messages`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });

    if (!res.ok) {
      bubble.textContent = '[ERROR] ' + res.status;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() ?? '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }
        if (ev.done) break;
        if (ev.text) {
          aiText += ev.text;
          bubble.textContent = aiText;
          scrollToBottom();
        }
      }
    }
  } catch (e) {
    bubble.textContent = '[ERROR] ' + e.message;
  } finally {
    bubble.classList.remove('streaming-cursor');
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    scrollToBottom();
    await loadSessions();
  }
}

function appendMessage(role, content) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = role === 'user' ? 'あなた' : 'Claude';
  div.innerHTML = `<div class="msg-label">${label}</div><div class="msg-bubble">${escHtml(content)}</div>`;
  msgs.appendChild(div);
  scrollToBottom();
  return div;
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
function scrollToBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

// ---- Sidebar ----
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

// ---- Helpers ----
function escHtml(s) {
  return (s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

// ---- Import from Claude Code ----
async function openImportModal() {
  document.getElementById('import-modal-overlay').style.display = 'flex';
  const list = document.getElementById('cc-session-list');
  list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px">読み込み中...</div>';
  try {
    const res = await fetch('/api/claude-code/sessions');
    const sessions = await res.json();
    if (sessions.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px">セッションが見つかりません</div>';
      return;
    }
    list.innerHTML = '';
    for (const s of sessions) {
      const div = document.createElement('div');
      div.style.cssText = 'padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:3px';
      div.onmouseenter = () => div.style.background = 'var(--surface2)';
      div.onmouseleave = () => div.style.background = '';
      div.innerHTML = `
        <div style="font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(s.title || '(タイトルなし)')}</div>
        <div style="font-size:11px;color:var(--text2);display:flex;gap:8px">
          <span>📁 ${escHtml(s.projectDir)}</span>
          <span>💬 ${s.messageCount}件</span>
          <span>🕐 ${new Date(s.lastModified).toLocaleDateString('ja-JP')}</span>
        </div>`;
      div.onclick = () => importCcSession(s.id);
      list.appendChild(div);
    }
  } catch(e) {
    list.innerHTML = `<div style="padding:20px;color:#e74c3c;font-size:13px">エラー: ${escHtml(e.message)}</div>`;
  }
}

function closeImportModal() {
  document.getElementById('import-modal-overlay').style.display = 'none';
}

async function importCcSession(sessionId) {
  const list = document.getElementById('cc-session-list');
  list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px">インポート中...</div>';
  try {
    const res = await fetch(`/api/claude-code/sessions/${sessionId}/import`, { method: 'POST' });
    if (!res.ok) {
      const err = await res.json();
      alert('エラー: ' + (err.error ?? '不明'));
      closeImportModal();
      return;
    }
    const session = await res.json();
    closeImportModal();
    await loadSessions();
    selectSession(session.id, 'claude');
  } catch(e) {
    alert('エラー: ' + e.message);
    closeImportModal();
  }
}

document.getElementById('import-modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('import-modal-overlay')) closeImportModal();
});

loadSessions();
</script>
</body>
</html>
